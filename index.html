<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NYC Trip</title>
<style>
body{font-family:-apple-system,system-ui;background:#f5f5f7;color:#111;margin:0}
header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:white;border-bottom:1px solid #ddd}
#dayNav{display:flex;gap:10px;align-items:center}
#dayNav button{background:#eee;color:#111}
#weatherBar{padding:8px;background:#f0f0f0;border-bottom:1px solid #ddd;font-size:14px}
#stops{padding:16px}
.stop{background:white;padding:14px;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.transport{font-size:13px;color:#555;margin:6px 0}
button{padding:8px 10px;border-radius:8px;border:none;background:#007aff;color:white;margin-top:6px}
.actions{position:fixed;bottom:0;width:100%;background:white;padding:10px;display:flex;gap:10px;border-top:1px solid #ddd}
.actions button{flex:1}
#menu{position:fixed;top:0;left:-260px;width:260px;height:100%;background:white;box-shadow:2px 0 10px rgba(0,0,0,.2);transition:left .25s;padding:20px;z-index:1000}
#menu.open{left:0}
.menuItem{padding:12px 0;border-bottom:1px solid #eee}
#map{height:300px;margin:10px;border-radius:10px}
</style>
</head>
<body>

<div id="menu">
<div class="menuItem" onclick="goHotel()">🏨 Return Hotel</div>
<div class="menuItem" onclick="openRoute()">🗺 Full Route</div>
<div class="menuItem" onclick="nextStop()">➡️ Next Stop</div>
<div class="menuItem" onclick="meetHere()">📍 Meet Here</div>
<div class="menuItem" onclick="showMap()">🗺 Map</div>
<div class="menuItem" onclick="nearbyCoffee()">☕ Nearby Coffee</div>
<div class="menuItem" onclick="nearbyFood()">🍜 Nearby Food</div>
</div>

<header>
<button onclick="toggleMenu()">☰</button>

<div id="dayNav">
<button onclick="prevDay()">←</button>
<h3 id="dayTitle">NYC</h3>
<button onclick="nextDay()">→</button>
</div>

<button onclick="meetHere()">Meet</button>
</header>

<div id="weatherBar">
<span id="temp"></span>
<span id="rain"></span>
</div>

<div id="map"></div>

<div id="stops"></div>

<div class="actions">
<button onclick="nextStop()">Next</button>
<button onclick="openRoute()">Route</button>
<button onclick="showMap()">Map</button>
</div>

<script src="app.js?v=12"></script>
</body>
</html>
