<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NYC Trip</title>

<style>
body{
font-family:-apple-system,system-ui;
background:#F3EFE6;
margin:0;
color:#1E1E1E;
}

header{
padding:14px;
background:white;
border-bottom:2px solid #C9A227;
text-align:center;
}

#dayMeta{
font-size:12px;
letter-spacing:1px;
color:#666;
}

#dayTitle{
font-size:20px;
font-weight:600;
}

#stops{
padding:12px;
}

.stop{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:white;
border-radius:8px;
margin-bottom:10px;
}

.stop.current{
border-left:6px solid #C9A227;
background:#F8F3E7;
}

.left{
display:flex;
gap:12px;
align-items:center;
}

.badge{
width:32px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #C9A227;
font-family:serif;
font-weight:700;
}

.right{
text-align:right;
font-size:12px;
color:#666;
}

button{
padding:10px;
border:none;
background:#007AFF;
color:white;
border-radius:6px;
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<div id="dayMeta"></div>
<div id="dayTitle"></div>
</header>

<div id="stops"></div>

<button id="nextBtn">Next</button>

<script src="app.js?v=31"></script>

</body>
</html>
