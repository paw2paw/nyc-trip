<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NYC Trip</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<style>
body{font-family:-apple-system,system-ui;background:#F3EFE6;color:#1E1E1E;margin:0}
header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:white;border-bottom:2px solid #C9A227}
#dayNav{display:flex;gap:10px;align-items:center}
#dayTitle{font-family:"Playfair Display",serif;font-size:18px}
#weatherBar{padding:8px;background:#f8f6f2;border-bottom:1px solid #d7d2c8;font-size:14px}
#stops{padding:16px;padding-bottom:100px}
.stop{background:white;padding:14px;border-radius:10px;margin-bottom:12px;border-left:4px solid #C9A227;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.transport{font-size:13px;color:#666;margin:4px 0}
button{padding:8px 10px;border-radius:8px;border:none;background:#007aff;color:white;margin-top:6px}
.actions{position:fixed;bottom:0;width:100%;background:white;padding:10px;display:flex;gap:10px;border-top:1px solid #d7d2c8}
.actions button{flex:1}
#menu{position:fixed;top:0;left:-100%;width:80%;max-width:300px;height:100%;background:white;box-shadow:2px 0 10px rgba(0,0,0,.2);transition:left .25s;padding:20px;z-index:1000}
#menu.open{left:0}
.menuClose{font-size:22px;text-align:right;margin-bottom:10px;cursor:pointer}
.menuItem{padding:12px 0;border-bottom:1px solid #eee;font-size:16px}
#map{display:none;height:300px;margin:10px;border-radius:10px}
</style>
</head>
<body>

<div id="menu">
<div class="menuClose" onclick="toggleMenu()">✕</div>
<div class="menuItem" onclick="returnHotel()">🏨 Return To Hotel</div>
<div class="menuItem" onclick="navigateDay()">🗺 Navigate Day Route</div>
<div class="menuItem" onclick="nextStop()">➡ Go To Next Stop</div>
<div class="menuItem" onclick="sendMyLocation()">📍 Send My Location</div>
<div class="menuItem" onclick="sendStopLocation()">📌 Send Meeting Point</div>
<div class="menuItem" onclick="showMap()">🗺 Show Map Overview</div>
<div class="menuItem" onclick="nearbyCoffee()">☕ Find Coffee Nearby</div>
<div class="menuItem" onclick="nearbyFood()">🍜 Find Food Nearby</div>
</div>

<header>
<button onclick="toggleMenu()">☰</button>

<div id="dayNav">
<button onclick="prevDay()">←</button>
<div id="dayTitle">Day</div>
<button onclick="nextDay()">→</button>
</div>

<button onclick="sendMyLocation()">💬 Meet</button>
</header>

<div id="weatherBar">
<span id="temp"></span>
<span id="rain"></span>
</div>

<div id="map"></div>
<div id="stops"></div>

<div class="actions">
<button onclick="nextStop()">Next Stop</button>
<button onclick="navigateDay()">Route</button>
<button onclick="showMap()">Map</button>
</div>

<script src="app.js?v=14"></script>
</body>
</html>
