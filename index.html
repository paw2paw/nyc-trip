<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NYC Trip</title>

<style>
body{
font-family:-apple-system,system-ui;
background:#F3EFE6;
margin:0;
color:#1E1E1E;
}

header{
padding:14px;
background:white;
border-bottom:2px solid #C9A227;
text-align:center;
}

#dayMeta{
font-size:12px;
letter-spacing:1px;
color:#666;
}

#dayTitle{
font-size:20px;
font-weight:600;
}

#stops{
padding:12px;
}

.stop{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:white;
border-radius:8px;
margin-bottom:10px;
}

.stop.current{
border-left:6px solid #C9A227;
background:#F8F3E7;
}

.left{
display:flex;
gap:12px;
align-items:center;
}

.badge{
width:32px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #C9A227;
font-family:serif;
font-weight:700;
}

.right{
text-align:right;
font-size:12px;
color:#666;
}

button{
padding:10px;
border:none;
background:#007AFF;
color:white;
border-radius:6px;
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<div id="dayMeta"></div>
<div id="dayTitle"></div>
</header>

<div id="stops"></div>

<button id="nextBtn">Next</button>

<script src="app.js?v=31"></script>

</body>
</html>

<div id="menuOverlay" onclick="toggleMenu()"></div>

<div id="menu">
<div class="menuHeader">
<span>Menu</span>
<button onclick="toggleMenu()">✕</button>
</div>

<div class="menuItem" onclick="returnHotel()">🏨 Return Hotel</div>
<div class="menuItem" onclick="navigateDay()">🗺 Navigate Day Route</div>
<div class="menuItem" onclick="showMap()">🗺 Map</div>
<div class="menuItem" onclick="nearbyCoffee()">☕ Coffee Nearby</div>
<div class="menuItem" onclick="nearbyFood()">🍜 Food Nearby</div>
<div class="menuItem" onclick="sendMyLocation()">📍 Share My Location</div>

</div>

<style>

#menuOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
opacity:0;
pointer-events:none;
transition:opacity .25s;
z-index:90;
}

#menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:white;
box-shadow:2px 0 12px rgba(0,0,0,.2);
transition:left .25s;
z-index:100;
padding:16px;
}

#menu.open{
left:0;
}

#menuOverlay.open{
opacity:1;
pointer-events:auto;
}

.menuHeader{
display:flex;
justify-content:space-between;
font-weight:600;
margin-bottom:20px;
}

.menuItem{
padding:12px 0;
border-bottom:1px solid #eee;
cursor:pointer;
}

</style>
